<!DOCTYPE html>
<html>
<head>
    <title>Icon Converter</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .icon-item { text-align: center; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        canvas { border: 1px solid #ccc; }
        .download-btn { margin-top: 10px; padding: 5px 10px; background: #1B4F8A; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>PWA Icon Converter</h1>
    <p>This page converts SVG icons to PNG format for the PWA.</p>
    
    <div class="icon-grid" id="iconGrid"></div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const iconGrid = document.getElementById('iconGrid');

        // Generate SVG content
        function generateSVGIcon(size) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad${size}" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1B4F8A;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#C9922A;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="${size}" height="${size}" rx="${size * 0.15}" fill="url(#grad${size})"/>
                <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="${size * 0.4}" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">G</text>
            </svg>`;
        }

        // Convert SVG to PNG
        function svgToPng(svgString, size, filename) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);

                canvas.toBlob(function(blob) {
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    URL.revokeObjectURL(link.href);
                }, 'image/png');
            };

            img.src = url;
        }

        // Create icon items
        sizes.forEach(size => {
            const svgContent = generateSVGIcon(size);
            
            const iconItem = document.createElement('div');
            iconItem.className = 'icon-item';
            
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = '100px';
            canvas.style.height = '100px';
            
            const ctx = canvas.getContext('2d');
            const img = new Image();
            const svgBlob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
            };

            img.src = url;

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.textContent = `Download ${size}x${size}`;
            downloadBtn.onclick = () => svgToPng(svgContent, size, `icon-${size}x${size}.png`);

            const label = document.createElement('div');
            label.textContent = `${size}x${size}`;
            label.style.marginBottom = '10px';
            label.style.fontWeight = 'bold';

            iconItem.appendChild(label);
            iconItem.appendChild(canvas);
            iconItem.appendChild(downloadBtn);
            iconGrid.appendChild(iconItem);
        });

        // Add download all button
        const downloadAllBtn = document.createElement('button');
        downloadAllBtn.textContent = 'Download All Icons';
        downloadAllBtn.style.padding = '10px 20px';
        downloadAllBtn.style.background = '#C9922A';
        downloadAllBtn.style.color = 'white';
        downloadAllBtn.style.border = 'none';
        downloadAllBtn.style.borderRadius = '4px';
        downloadAllBtn.style.cursor = 'pointer';
        downloadAllBtn.style.fontSize = '16px';
        downloadAllBtn.style.marginTop = '20px';
        
        downloadAllBtn.onclick = () => {
            sizes.forEach(size => {
                setTimeout(() => {
                    const svgContent = generateSVGIcon(size);
                    svgToPng(svgContent, size, `icon-${size}x${size}.png`);
                }, size); // Stagger downloads
            });
        };

        document.body.appendChild(downloadAllBtn);

        // Instructions
        const instructions = document.createElement('div');
        instructions.innerHTML = `
            <h3>Instructions:</h3>
            <ol>
                <li>Click "Download All Icons" to download all PNG icons</li>
                <li>Save the downloaded PNG files to the <code>public/icons/</code> directory</li>
                <li>Replace the .svg extensions with .png in the manifest.json file</li>
            </ol>
        `;
        instructions.style.marginTop = '30px';
        instructions.style.padding = '20px';
        instructions.style.background = '#f5f5f5';
        instructions.style.borderRadius = '8px';
        
        document.body.appendChild(instructions);
    </script>
</body>
</html>
